version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factorymind-api
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/workspace/storage
      - ./backend/.env:/workspace/.env
    environment:
      - CHROMA_PERSIST_DIR=/workspace/storage/chromadb
      - UPLOAD_DIR=/workspace/storage/uploads
    networks:
      - factorymind-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factorymind-ui
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - factorymind-network
    restart: unless-stopped

networks:
  factorymind-network:
    driver: bridge

volumes:
  storage:

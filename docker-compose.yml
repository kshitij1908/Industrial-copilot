version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial-copilot-api
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend/.env:/app/.env
    environment:
      - CHROMA_PERSIST_DIR=/app/storage/chromadb
      - UPLOAD_DIR=/app/storage/uploads
    networks:
      - copilot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: industrial-copilot-ui
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - copilot-network
    restart: unless-stopped

networks:
  copilot-network:
    driver: bridge

volumes:
  storage:
